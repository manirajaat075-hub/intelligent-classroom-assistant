                if (savedData) {
                    const parsed = JSON.parse(savedData);

                        { id: 2, time: '11:30 AM', subject: 'AI Ethics', room: 'Hall A', status: 'Next' },
                    ];
                    setStudents(defaultStudents);
                    setTimetable(defaultTimetable);
                    localStorage.setItem(`CLASS_DATA_${id}`, JSON.stringify({ students: defaultStudents, timetable: defaultTimetable }));
                }
            }, []);

            useEffect(() => {
                loadData(classroomId);
            }, [classroomId, loadData]);

            useEffect(() => {
                const handleStorageChange = (e) => {

                        loadData(classroomId);

                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [classroomId, loadData]);

            // Save updates to LocalStorage
            useEffect(() => {
                if (classroomId && students.length > 0) {
                    localStorage.setItem(`CLASS_DATA_${classroomId}`, JSON.stringify({ students, timetable }));
                }
            }, [students, timetable, classroomId]);

            const handleLoginSelection = (r) => { 
                if (r === 'student') setView('student_join');
                else setView('staff_auth');
            };

            const handleStaffLogin = (user) => {
                setClassroomId(user.classroomId);
                setView('staff_dashboard');
                setActiveTab('Home');
            };

            const handleStudentJoin = (id) => {
                setClassroomId(id);
                setView('student_dashboard');
                setActiveTab('Home');
            };

            const menu = [
                {l: 'Home', i: 'home'}, {l: 'Students', i: 'users'}, {l: 'Attendance', i: 'clipboard-list'}, {l: 'Assignment', i: 'book-open'}, {l: 'Timetable', i: 'calendar'}

                        React.createElement('h3', { className: "text-3xl font-black italic tracking-tighter text-white" }, p),
                        React.createElement('p', { className: "text-slate-600 text-[10px] uppercase font-black tracking-[0.2em] mt-2" }, "Vault Access")

                    React.createElement('h2', { className: "text-4xl font-black gradient-text tracking-tighter italic" }, "AI.X"),
                    React.createElement('nav', { className: "flex-1 space-y-4" },
                        menu.map(m => React.createElement('button', {

                ),
                React.createElement('main', { className: "flex-1 p-8 md:p-16 bg-mesh" },
                    React.createElement('div', { className: "max-w-6xl mx-auto" },
                        React.createElement('header', { className: "flex justify-between items-center mb-12" },
                            React.createElement('div', { className: "text-left" },
                                React.createElement('p', { className: "text-slate-500 text-[10px] uppercase font-black tracking-[0.4em] mb-2" }, "Console"),
                                React.createElement('h2', { className: "text-5xl font-black tracking-tighter uppercase" }, activeTab)
                            ),
                            view.includes('staff') ? React.createElement('div', { className: "px-6 py-3 bg-slate-900 rounded-2xl border border-purple-500/20 flex items-center gap-4 shadow-2xl" },
                                React.createElement('div', { className: "w-2 h-2 rounded-full bg-purple-400 animate-pulse" }),
                                React.createElement('div', { className: "flex flex-col items-start" },

                                React.createElement(LucideIcon, { name: "search", size: 18, className: "text-slate-500 mr-3" }),
                                React.createElement('input', { 
                                    type: "text",

                                    value: classroomId,
                                    className: "bg-transparent border-none outline-none text-sm font-bold italic w-full text-white placeholder:text-slate-600"

                        view === 'student_dashboard' && activeTab === 'Home' ? React.createElement(StudentDashboardComp, { students, timetable }) : React.createElement(StaffDashboard, { activeTab, classroomId, students, setStudents, timetable, setTimetable, role: view.includes('staff') ? 'staff' : 'student' })
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
